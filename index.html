<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARISE v4.55 | Corrected Intake Vent</title>
    <link rel="stylesheet" href="style.css?v=4.55">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="sidebar">
        <h1>ARISE v4.55 <br><small>Biosecurity & Climate Sim</small></h1>
        
        <div id="viability-index">
            STATUS: <span id="statusText">OPTIMAL</span>
            <div id="statusIndicator"></div>
        </div>

        <div class="control-group">
            <label>Birds: <span id="birdCountVal">2400</span></label>
            <input type="range" id="birdCount" min="0" max="3000" value="2400">
        </div>

        <div class="control-group">
            <label>Fans (48" Cone): <span id="fanCountVal">4</span></label>
            <input type="range" id="fanCount" min="1" max="6" value="4">
        </div>

        <div class="control-group">
            <label>Baffle Drop (ft): <span id="baffleVal">5</span></label>
            <input type="range" id="baffleDrop" min="0" max="8" value="5">
        </div>

        <div class="control-group">
            <label>HVLS 8' Ceiling Fans</label>
            <button id="hvlsToggle" class="toggle-btn">HVLS OFF</button>
            <label style="margin-top:8px;">HVLS Speed: <span id="hvlsSpeedVal">50</span>%</label>
            <input type="range" id="hvlsSpeed" min="10" max="100" value="50">
        </div>

        <div class="control-group">
            <label>Passive Vent (Intake Wall)</label>
            <button id="louverToggle" class="toggle-btn">CLOSED</button>
        </div>

        <div class="control-group">
            <label>Airflow Visualization</label>
            <button id="pathToggle" class="toggle-btn">SHOW PATHS</button>
        </div>

        <div class="control-group">
            <label>Ambient Temp: <span id="extTempVal">90</span>°F</label>
            <input type="range" id="extTemp" min="75" max="105" value="90">
        </div>

        <div class="control-group">
            <label>Ambient Humidity: <span id="extHumVal">85</span>%</label>
            <input type="range" id="extHum" min="40" max="100" value="85">
        </div>

        <div class="control-group">
            <label>Pre-Cooling Zone</label>
            <select id="preCooling">
                <option value="0">None (Full Sun)</option>
                <option value="4">Camo Net (20'arch)</option>
                <option value="8">Trellis (20' arch)</option>
            </select>
        </div>

        <div id="metrics">
            <div class="metric-summary">
                <h4>Exhaust Levels</h4>
                <div class="metric-box">Temp: <b id="exTemp">--</b></div>
                <div class="metric-box">Ammonia: <b id="exAmmonia">--</b></div>
                <div class="metric-box">Humidity: <b id="exHum">--</b></div>
            </div>

            <div class="metric-summary" id="probeResults">
                <h4>Point Probe</h4>
                <div class="metric-box">Probe Temp: <b id="pTemp">--</b></div>
                <div class="metric-box">Probe NH3: <b id="pAmmonia">--</b></div>
                <div class="metric-box">Probe Hum: <b id="pHum">--</b></div>
            </div>
        </div>
    </div>

    <div id="viewport">
        <div class="canvas-container">
            <h3>Side View (100' Barn + 20' Arch)</h3>
            <canvas id="sideView"></canvas>
        </div>
        <div class="canvas-container">
            <h3>Overhead View (Airspeed & Thermal)</h3>
            <canvas id="topView"></canvas>
        </div>
    </div>

    <script src="app.js?v=4.55"></script>
</body>
</html>
