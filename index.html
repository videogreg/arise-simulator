<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISE v4.51 | Interactive Barn Probe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="sidebar">
        <h1>ARISE v4.51 <br><small>Biosecurity & Climate Sim</small></h1>
        
        <div id="viability-index">
            HEALTH STATUS: <span id="statusText">OPTIMAL</span>
            <div id="statusIndicator"></div>
        </div>

        <div class="control-group">
            <label>Bird Population: <span id="birdCountVal">2400</span></label>
            <input type="range" id="birdCount" min="0" max="3000" value="2400">
        </div>

        <div class="control-group">
            <label>Active 48" Fans: <span id="fanCountVal">4</span></label>
            <input type="range" id="fanCount" min="1" max="6" value="4">
        </div>

        <div class="control-group">
            <label>Baffle Drop (ft): <span id="baffleVal">5</span></label>
            <input type="range" id="baffleDrop" min="0" max="8" value="5">
        </div>

        <div class="control-group">
            <label>Ambient Temp (°F): <span id="extTempVal">90</span></label>
            <input type="range" id="extTemp" min="75" max="105" value="90">
        </div>

        <div class="control-group">
            <label>Pre-Cooling System</label>
            <select id="preCooling">
                <option value="0">None (Full Sun)</option>
                <option value="4">Camo Netting (-4°F)</option>
                <option value="8">Living Trellis (-8°F)</option>
            </select>
        </div>

        <div id="metrics">
            <div class="metric-summary">
                <h4>Exhaust (Final Output)</h4>
                <div class="metric-box">Temp: <b id="exTemp">--</b> °F</div>
                <div class="metric-box">Ammonia: <b id="exAmmonia">--</b> ppm</div>
            </div>

            <div class="metric-summary" id="probeResults">
                <h4>Point Probe (Click Map)</h4>
                <div class="metric-box">Local Temp: <b id="pTemp">--</b> °F</div>
                <div class="metric-box">Local NH3: <b id="pAmmonia">--</b> ppm</div>
                <div class="metric-box">Local Hum: <b id="pHum">--</b> %</div>
            </div>
        </div>
    </div>

    <div id="viewport">
        <div class="canvas-container">
            <h3>Side View (Click to Probe)</h3>
            <canvas id="sideView"></canvas>
        </div>
        <div class="canvas-container">
            <h3>Overhead View (Click to Probe)</h3>
            <canvas id="topView"></canvas>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
